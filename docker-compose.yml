services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: instructor-ledger-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - instructor-ledger

  nginx:
    image: nginx:1.27-alpine
    container_name: instructor-ledger-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - instructor-ledger

  mysql:
    image: mysql:8.0
    container_name: instructor-ledger-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: instructor_ledger
      MYSQL_USER: instructor
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - instructor-ledger

  redis:
    image: redis:7-alpine
    container_name: instructor-ledger-redis
    ports:
      - "6380:6379"
    networks:
      - instructor-ledger

  node:
    image: node:20-alpine
    container_name: instructor-ledger-node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "tail -f /dev/null"
    networks:
      - instructor-ledger

volumes:
  mysql_data:

networks:
  instructor-ledger:
    driver: bridge